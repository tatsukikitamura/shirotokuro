<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <!--
      SPA リダイレクト復元（spa-github-pages 方式）。
      404.html が付けた /?/charge を、本来の /charge へ書き戻してから
      アプリを起動する。React 側はこの pathname を見てページを決める。
    -->
    <script type="text/javascript">
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          )
        }
      })(window.location)
    </script>
    <meta name="description" content="「白と黒」――パズルの中に閉じ込められた“空白者”と向き合う、パズル×物語アドベンチャー。あなたは救済者として、止まった時間に意味を与えていく。" />
    <title>白と黒 | パズル×物語アドベンチャー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
