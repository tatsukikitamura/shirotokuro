<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>白と黒</title>
    <!--
      GitHub Pages 用 SPA リダイレクト（spa-github-pages 方式）。
      存在しないパス（例 /shirotokuro/charge）に直接アクセス／リロードすると
      GitHub はこの 404.html を返す。ここで一旦 /shirotokuro/?/charge へ
      置き換え、index.html 側のスクリプトが元のパスへ復元する。
      pathSegmentsToKeep = 1 はプロジェクトページ（/shirotokuro/）の階層数。
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
